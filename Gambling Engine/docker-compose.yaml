services:
  # Database for historical data and bet tracking
  db:
    image: postgres:15-alpine
    container_name: mlb_betting_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mlb_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Message broker for real-time inning updates
  redis:
    image: redis:7-alpine
    container_name: mlb_message_bus
    ports:
      - "6379:6379"

  # Database GUI: Access at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4
    container_name: mlb_db_viewer
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  # Management Frontend: Access at http://localhost:3000
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlb_frontend
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/mlb_engine
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data: