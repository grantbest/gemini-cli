services:
  db:
    image: postgres:15-alpine
    container_name: mlb_db_local
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mlb_engine_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mlb_redis_local
    ports:
      - "6379:6379"

  mock_api:
    build: ./scripts/mock_api
    container_name: mlb_mock_api
    ports:
      - "5001:5000"

  engine:
    build: .
    container_name: mlb_engine_local
    environment:
      DB_HOST: db
      DB_NAME: mlb_engine_local
      DB_USER: admin
      DB_PASS: password123
      REDIS_HOST: redis
      MLB_API_BASE_URL: http://mock_api:5000/api/v1
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - db
      - redis
      - mock_api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlb_frontend_local
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/mlb_engine_local
      APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data_local:
