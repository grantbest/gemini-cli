name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    strategy:
      matrix:
        service: [engine, frontend, mock-api]
        include:
          - service: engine
            context: .
            dockerfile: Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - service: mock-api
            context: ./scripts/mock_api
            dockerfile: scripts/mock_api/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_HOST || secrets.DEV_SSH_HOST }}
          username: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_USER || secrets.DEV_SSH_USER }}
          key: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_KEY || secrets.DEV_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE_NAME_PREFIX,REGISTRY,DISCORD_WEBHOOK_URL,DB_PASS
          script: |
            cd ~/apps/gambling-engine
            git pull origin ${{ github.ref_name }}
            
            # Export variables for docker compose
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_NAME_PREFIX=${{ env.IMAGE_NAME_PREFIX }}
            export IMAGE_TAG=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
            export DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            export DB_PASS=${{ secrets.DB_PASS }}
            
            # Select the correct compose files
            COMPOSE_FILES="-f docker-compose.yml"
            if [ "${{ github.ref_name }}" == "main" ]; then
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.prod.yml"
            else
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.dev.yml"
            fi
            
            docker compose $COMPOSE_FILES pull
            docker compose $COMPOSE_FILES up -d
