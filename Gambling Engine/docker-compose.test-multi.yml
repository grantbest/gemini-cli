services:
  # --- DEVELOPMENT STACK (Mock Data) ---
  db-dev:
    image: postgres:15-alpine
    container_name: mlb_db_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mlb_engine_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  engine-dev:
    build: .
    container_name: mlb_engine_dev
    environment:
      DB_HOST: db-dev
      DB_NAME: mlb_engine_dev
      DB_USER: admin
      DB_PASS: password123
      MLB_API_BASE_URL: http://mock_api:5000/api/v1
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - db-dev
      - mock_api

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlb_frontend_dev
    environment:
      DATABASE_URL: postgresql://admin:password123@db-dev:5432/mlb_engine_dev
      APP_ENV: development
      PROD_URL: http://localhost:3001
      DEV_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - db-dev

  mock_api:
    build: ./scripts/mock_api
    container_name: mlb_mock_api
    ports:
      - "5001:5000"

  # --- PRODUCTION STACK (Live Data) ---
  db-prod:
    image: postgres:15-alpine
    container_name: mlb_db_prod
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mlb_engine_prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  engine-prod:
    build: .
    container_name: mlb_engine_prod
    environment:
      DB_HOST: db-prod
      DB_NAME: mlb_engine_prod
      DB_USER: admin
      DB_PASS: password123
      # No MLB_API_BASE_URL means it hits LIVE MLB API
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - db-prod

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlb_frontend_prod
    environment:
      DATABASE_URL: postgresql://admin:password123@db-prod:5432/mlb_engine_prod
      APP_ENV: production
      PROD_URL: http://localhost:3001
      DEV_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - db-prod

volumes:
  postgres_data_dev:
  postgres_data_prod:
